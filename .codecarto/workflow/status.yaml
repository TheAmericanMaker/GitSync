project_name: "GitSync"
# source_location is defined in the active pipeline YAML. Do not duplicate it here.
pipeline: workflow/pipeline-full-with-deep-audit.yaml
# ^^^ To switch pipelines, change the line above AND adjust the phases below to match:
#   pipeline-full-with-deep-audit.yaml (default) → keep phases as-is (split defect scan)
#   pipeline-full-with-audit.yaml                → replace defect-scan-mechanical and defect-scan-semantic with a single defect-scan
#   pipeline.yaml                                → remove all defect-scan phases
#   pipeline-defect-scan.yaml                    → remove contracts through reimplementation-spec; collapse defect phases into a single defect-scan
#   pipeline-lite.yaml                           → remove all defect-scan phases, porting, and reimplementation-spec
#   pipeline-architecture-only.yaml              → keep only architecture
current_phase: contracts  # Set to "complete" when all phases are done.
last_updated: "2026-05-06"
# Schema for open_questions and carry_forward entries (see GUIDE.md "Open Questions vs Carry-Forward"):
#   open_questions: items that are still genuinely unknown (need a runtime test, maintainer decision, spec ruling).
#   carry_forward: items deferred to a specific later phase whose rubric is the right place to close them.
# Each entry is a mapping with keys: id, kind, description, deferred_reason
# carry_forward entries additionally carry: target_phase
# Allowed kinds: needs-runtime-test, needs-maintainer-decision, needs-spec-ruling,
#                defer-to-phase, needs-fixture-capture
phases:
  architecture:
    status: complete
    owner_notes:
      - "Stack: Rust core (libgit2 via git2-rs in a single 165KB git_manager.rs) + flutter_rust_bridge + Dart UI/services. lib/main.dart at 290KB plus lib/ui/page/onboarding_setup.dart (159KB), lib/ui/dialog/manual_sync.dart (84KB), lib/ui/page/ai_features_page.dart (80KB), lib/api/manager/auth/github_manager.dart (70KB) need section-by-section walks downstream."
      - "Runtime fulcrum: lib/gitsync_service.dart:_sync orchestrates every sync trigger. iOS-vs-Android isolate-lifetime split (iOS inline await vs Android Timer in _finishWidget) is a load-bearing concurrency hazard."
      - "iOS BGTaskScheduler hard-codes 101 identifiers (scheduled_sync_0..100) in Info.plist — direct cap on number of repo containers per device on iOS."
      - "Three pubspec dependency_overrides on ViscousPot forks (flutter_background_service_with_intents, mmap2_flutter, ios_document_picker) are load-bearing — a port must replicate semantic diffs."
      - "Inventoried 127 hand-written Dart files + 5 Rust files (frb_generated.rs and lib/src/rust/ excluded) in scratch/file-inventory.md."
    outputs_present:
      - findings/architecture/architecture-map.md
      - scratch/file-inventory.md
    open_questions:
      - id: arch-OQ3
        kind: needs-maintainer-decision
        description: "Why is lib/main.dart 290KB single-file? Intentional bundling for tree-shaking, FRB single-registration-site requirement, or historical accumulation?"
        deferred_reason: "A maintainer-decision-level question; not closable by any pipeline phase. Contracts phase still walks it page-by-page."
    carry_forward:
      # arch-CF7 and arch-CF8 resolved by defect-scan-mechanical (see C6.1 and the mmap-not-found note); kept here for trace.
      - id: arch-CF1
        kind: defer-to-phase
        target_phase: contracts
        description: "Catalog provider-API endpoints invoked by github_manager.dart (70KB), gitlab_manager.dart (47KB), gitea_manager.dart (49KB), codeberg_manager.dart thin wrapper; pin retry/rate-limit behavior."
        deferred_reason: "Contracts phase walks features and naturally enumerates REST surfaces + retry semantics. Mechanical Pass 2 already produced a rate-limit/retry summary feeding this; contracts phase absorbs."
      - id: arch-CF2
        kind: defer-to-phase
        target_phase: contracts
        description: "AI feature contract (chat / wand / agent). Trigger -> side effects -> persisted state -> error behavior."
        deferred_reason: "Contracts phase rubric covers user-visible features. Mechanical scan produced an AI feature-contract sketch in scratch/defects-ai.md and the mechanical-defects.md AI Feature Contract Sketch section feeding this."
      - id: arch-CF3
        kind: defer-to-phase
        target_phase: protocols
        description: "flutter_rust_bridge wire surface: every Rust-side function exposed via FRB paired with its Dart caller. rust/src/api/git_manager.rs 165KB; lib/api/manager/git_manager.dart 53KB."
        deferred_reason: "Protocols phase rubric is exactly this kind of wire-format extraction."
      - id: arch-CF4
        kind: defer-to-phase
        target_phase: protocols
        description: "flutter_background_service_with_intents (forked) intent broadcast protocol — what intents accepted, payloads, reply broadcasts. Constants in lib/gitsync_service.dart."
        deferred_reason: "Protocols phase."
      - id: arch-CF5
        kind: defer-to-phase
        target_phase: protocols
        description: "home_widget IPC protocol — SharedPreferences keys (forceSyncWidget_status), qualifiedAndroidName resolution to a Receiver, iOS WidgetCenter.shared.reloadTimelines(ofKind:) matching ForceSyncWidget."
        deferred_reason: "Protocols phase."
      - id: arch-CF6
        kind: defer-to-phase
        target_phase: protocols
        description: "iOS BGTaskScheduler 101-ID pool semantics — how slots are assigned to repos, what happens past container index 100, register/unregister lifecycle."
        deferred_reason: "Protocols phase."
      - id: arch-CF9
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "iOS-vs-Android _finishWidget Timer-vs-inline split — verify _syncGeneration race correctness across both isolate-lifetime models."
        deferred_reason: "Concurrency pass (semantic pass 3)."
      - id: arch-CF10
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "secrets.dart runtime use — verify no path leaks the OAuth client secret into logs, errors, or telemetry."
        deferred_reason: "Security pass (semantic pass 4). Mechanical Pass 6 confirmed C6.9: OAuth client secrets are baked into the APK at build time via heredoc; security pass needs to verify runtime non-leakage."
  defect-scan-mechanical:
    status: complete
    owner_notes:
      - "182 total findings (1 critical, 32 high, ~75 medium, ~75 low) across 24 source files."
      - "Critical: R2.3 — RemoteCallbacks::certificate_check returns CertificateCheckStatus::CertificateOk unconditionally (rust/src/api/git_manager.rs:756); combined with set_verify_owner_validation(false) and safe.directory=*, three independent libgit2 trust checks are disabled at process init. Trust-boundary regression vs stock libgit2."
      - "Top 5 high-severity themes: (1) Rust panics on perfectly-realistic inputs (R1.2/R1.3/R1.5/R1.6/R1.7/R1.9 — 6 panics on non-UTF8, transient I/O, RNG); (2) Provider clients are uniformly retry-naive across 4 backends, no 401/403/429 handling (P2.1/P2.2/P2.4/P2.5/P2.14, arch-CF1 partially resolved); (3) Sync orchestration UX deadlocks (D2.5 merge dialog hang on rethrow, D1.13 RangeError on empty repo names, D2.9 background callback mutates UI repo index); (4) AI conversation can be silently poisoned (A1.25 empty content-blocks dropped from wire while retained locally; A1.18 empty wand commits); (5) Storage layer footguns (D1.23 typed accessor throws on hasDefault keys; D1.24 comma-corrupts repo names list)."
      - "arch-CF7 (lib/global.dart:demo flag) resolved as Pass 6 finding C6.1 (high severity — manual TODO with no CI enforcement)."
      - "arch-CF8 (mmap2_flutter) partial: NO mmap references in any of 24 scanned files. Re-routed to defect-scan-semantic Pass 3 with target lib/ui/page/{file_explorer, code_editor, diff_view}.dart and lib/main.dart."
      - "Sub-agent delegation: 4 parallel general-purpose subagents covered Rust core, Dart sync layer, provider clients, AI subsystem. Per-area scratch reports retained at scratch/defects-{rust-core, dart-sync, providers, ai}.md as canonical detail; mechanical-defects.md is the synthesis."
    outputs_present:
      - findings/defect-scan-mechanical/mechanical-defects.md
      - scratch/defects-rust-core.md
      - scratch/defects-dart-sync.md
      - scratch/defects-providers.md
      - scratch/defects-ai.md
    open_questions: []
    carry_forward:
      - id: defR-CF1
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "R2.3: certificate_check + set_verify_owner_validation(false) + safe.directory=* — three trust checks disabled at process init. Trust-boundary regression. Pass 4 (security)."
        deferred_reason: "Trust-boundary classification needs the security-pass rubric; mechanical pass already filed it as Pass 2 critical."
      - id: defR-CF2
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "All Rust errors funneled to git2::Error::from_str(string) losing class/code; FRB boundary surfaces as String only. Dart cannot distinguish auth/network/conflict/lock failures. Pass 5 (contract drift)."
        deferred_reason: "Contract-violation classification."
      - id: defR-CF3
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "run_with_lock flock-based queue: probe-eviction logic (~lines 363-443) races against position-0 holder's QueueCleanupGuard::drop (lines 510-543). Pass 3 (concurrency)."
        deferred_reason: "Concurrency pass."
      - id: defR-CF6
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "unsafe { env::set_var(...) } at lines 705-706 of git_manager.rs is unsound on multi-threaded processes (Rust 2024 marks unsafe). FRB worker pools are multi-threaded. Pass 3."
        deferred_reason: "Concurrency / unsoundness."
      - id: defR-CF7
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "init() mutates global libgit2 state every call; concurrent calls from FRB worker threads race on the global flag. Pass 3."
        deferred_reason: "Concurrency on global state."
      - id: S-D-1
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "SettingsManager.keyNamespace is a static field mutated by reinit(); concurrent calls (accessibility loop + UI sync) corrupt the per-call namespace. Pass 3."
        deferred_reason: "Concurrency."
      - id: S-D-2
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "_syncGeneration / isSyncing / isScheduled ad-hoc reentrancy gate read/written across UI + service isolates. Pass 3 (cross-isolate concurrency)."
        deferred_reason: "Concurrency."
      - id: S-D-3
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "accessibilityEvent may re-enter and shares static lastOpenPackageName / lastOpenPackageNameExcludingInputs. Pass 3."
        deferred_reason: "Concurrency."
      - id: S-D-4
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "merge() client-mode path commits but never pushes — verify intent against client-mode contract. Pass 5."
        deferred_reason: "Behavioral correctness against contract."
      - id: S-D-5
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "backgroundUploadChanges.mergeConflictCallback mutates global repoman_repoIndex — cross-context state mutation. Pass 5 (contract) / Pass 3 (concurrency)."
        deferred_reason: "Contract / concurrency."
      - id: sem-cand-providers-1
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "OAuth refresh race in git_provider_manager.dart:getToken (P1.2) — concurrent provider calls each call refreshToken, invalidating each others' tokens. Pass 3."
        deferred_reason: "Concurrency on secure-storage state."
      - id: sem-cand-providers-2
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "Logger may include OAuth token or response body in error logs (P2.6, P2.7). print() use in github_manager.dart line ~1741 echoes response body. Verify logger.dart redaction. Pass 4."
        deferred_reason: "Security / sensitive-data audit."
      - id: sem-cand-providers-3
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "Idempotency under retry — if any retry layer is added later (per P2.1), createIssue/createPullRequest/addIssueComment/addReaction are unprotected against duplicate creation (P2.14). Pass 5."
        deferred_reason: "Behavioral correctness on side-effecting POSTs."
      - id: sem-cand-providers-4
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "401-on-expired-token does not trigger re-auth (P2.4). User sees empty data. Pass 5."
        deferred_reason: "UX / state-machine drift."
      - id: A-SEM-1
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "Static system prompts + repository file content (via file_read tool) concatenated into LLM messages. Malicious repository content can subvert system prompt — prompt injection. Pass 4."
        deferred_reason: "Security."
      - id: A-SEM-2
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "print('[AI Stream] ...') and similar print lines write provider responses + exception text to logcat / iOS unified log. Some providers echo headers; rare key fragments. Pass 4 (token / key leakage in logs)."
        deferred_reason: "Security."
      - id: A-SEM-3
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "API key in ?key=$apiKey query string for Google. Query strings appear in HTTP server / proxy logs, in Flutter debug console. Pass 4."
        deferred_reason: "Security (credential exposure via URL)."
      - id: A-SEM-4
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "normalizeEndpoint defaults to http:// if no scheme — self-hosted users may transmit API keys in plaintext. Pass 4."
        deferred_reason: "Security."
      - id: A-SEM-5
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "formatDiffParts may include user file content (potentially repo-content secrets) in prompts sent to LLM. Pass 4 (sensitive-content exfiltration)."
        deferred_reason: "Security."
      - id: A-SEM-6
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "Agent has tools (git_force_push, git_download_and_overwrite, git_reset_to_commit, git_squash_commits) gated only by user-tap confirmation. Prompt-injection (A-SEM-1) into a confirm-tier tool call could be approved by an inattentive user — confused-deputy. Pass 4."
        deferred_reason: "Security (social engineering)."
      - id: arch-CF8-residual
        kind: defer-to-phase
        target_phase: defect-scan-semantic
        description: "mmap2_flutter call sites NOT FOUND in 24 scanned files. Re-route to Pass 3 with target lib/ui/page/file_explorer.dart, lib/ui/page/code_editor.dart, lib/ui/dialog/diff_view.dart, and lib/main.dart."
        deferred_reason: "Concurrency on memory-mapped reads; locate the call sites first."
  contracts:
    status: pending
    owner_notes: []
    outputs_present: []
    open_questions: []
    carry_forward: []
  protocols:
    status: pending
    owner_notes: []
    outputs_present: []
    open_questions: []
    carry_forward: []
  defect-scan-semantic:
    status: pending
    owner_notes: []
    outputs_present: []
    open_questions: []
    carry_forward: []
  porting:
    status: pending
    owner_notes: []
    outputs_present: []
    open_questions: []
    carry_forward: []
  reimplementation-spec:
    status: pending
    owner_notes: []
    outputs_present: []
    open_questions: []
    carry_forward: []
next_actions:
  - "Begin contracts: read findings/architecture/architecture-map.md and findings/defect-scan-mechanical/mechanical-defects.md (~70KB — has the AI feature contract sketch and provider rate-limit summary already drafted). Pick up arch-CF1 (provider endpoint catalog + retry/rate-limit) and arch-CF2 (AI feature contracts) from architecture.carry_forward. Use templates/behavioral-contracts.md. Deep-read targets: lib/main.dart (290KB — spawn a subagent for feature-by-feature walk into scratch/main-feature-inventory.md per the original plan), lib/ui/page/onboarding_setup.dart (159KB — also via subagent), lib/ui/dialog/manual_sync.dart (84KB), lib/ui/dialog/auth.dart (22KB), lib/api/manager/auth/* (already inventoried in defects-providers.md)."
